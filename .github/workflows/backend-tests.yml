name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requeriments.txt

      - name: Install dependencies
        run: pip install -r requeriments.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          USER_1_TOKEN: test-token-user1
          USER_2_TOKEN: test-token-user2
