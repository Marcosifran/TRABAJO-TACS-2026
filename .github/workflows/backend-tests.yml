name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "7.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requeriments.txt

      - name: Install dependencies
        run: pip install -r requeriments.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60
        env:
          USER_1_TOKEN: test-token-user1
          USER_2_TOKEN: test-token-user2
