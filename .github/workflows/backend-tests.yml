name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Start MongoDB
        run: |
          docker pull mongo:7
          docker run -d --name mongodb -p 27017:27017 mongo:7

      - name: Wait for MongoDB to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec mongodb mongosh --eval 'db.runCommand({ ping: 1 })' > /dev/null 2>&1; then
              echo "MongoDB ready"
              break
            fi
            echo "Waiting for MongoDB... attempt $i"
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requeriments.txt

      - name: Install dependencies
        run: pip install -r requeriments.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app/ --ignore-missing-imports

      - name: Tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60
